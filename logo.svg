<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer white border ring -->
  <circle cx="100" cy="100" r="96" fill="#E8E8E8" stroke="#CCCCCC" stroke-width="1"/>
  <!-- Red circle -->
  <circle cx="100" cy="100" r="88" fill="#D41A2B"/>
  <!-- White diagonal slash - top-right to bottom-left -->
  <line x1="145" y1="40" x2="55" y2="160" stroke="#FFFFFF" stroke-width="22" stroke-linecap="butt"/>
  <!-- White diagonal slash - top-left to bottom-right -->
  <line x1="55" y1="40" x2="145" y2="160" stroke="#FFFFFF" stroke-width="22" stroke-linecap="butt"/>
  <!-- Center plate: black border -->
  <rect x="28" y="68" width="144" height="64" rx="5" ry="5" fill="#1A1A1A"/>
  <!-- Center plate: white fill -->
  <rect x="32" y="72" width="136" height="56" rx="3" ry="3" fill="#FFFFFF"/>
  <!-- Bold "0" -->
  <text x="62" y="116" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="52" fill="#1A1A1A" text-anchor="middle">0</text>
  <!-- "PROMO" text -->
  <text x="118" y="98" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="22" fill="#1A1A1A" text-anchor="middle" letter-spacing="1">PROMO</text>
  <!-- "RECS" text -->
  <text x="118" y="120" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="22" fill="#1A1A1A" text-anchor="middle" letter-spacing="1">RECS</text>
  <!-- Top bolt -->
  <circle cx="100" cy="12" r="4" fill="#888888" stroke="#666666" stroke-width="1"/>
  <circle cx="100" cy="12" r="1.5" fill="#AAAAAA"/>
  <!-- Bottom bolt -->
  <circle cx="100" cy="188" r="4" fill="#888888" stroke="#666666" stroke-width="1"/>
  <circle cx="100" cy="188" r="1.5" fill="#AAAAAA"/>
  <!-- Subtle scratches/wear for street sign feel -->
  <line x1="30" y1="50" x2="45" y2="48" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
  <line x1="150" y1="140" x2="170" y2="138" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <line x1="60" y1="150" x2="70" y2="148" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
</svg>